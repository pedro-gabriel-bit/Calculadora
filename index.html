<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calaculadora inteligente</title>
</head>

<body>
    <main>
        <div class="areaCalculadora"></div>
        <h1>Calculadora</h1>
        <div class="inputsDeNumeros">
        <input type="text" id="n1" placeholder="primeiro numero">
        <input type="text" id="n2" placeholder="segundo numero">
        </div>

        <button id="btnSomar" class="operador">Soma</button>
        <button id="btnSubtrair" class="operador">Subtrair</button>
        <button id="btnMultiplicar" class="operador">Multiplicar</button>
        <button id="btnDividir" class="operador">Dividir</button>
        <div class="areaResultado">
        <p id="Resultado">Resultado: </p>
        </div>
        <button id="btnLimpar" class="styleBtnLimpar">Limpara</button>
    </main>
    <script src="script.js"></script>
</body>

</html>
